name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  server-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run tests
        env:
          DB_DIALECT: sqlite
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-at-least-32-characters-long
          MASTER_KEY: 0123456789abcdef0123456789abcdef
        run: npm test

  admin-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  client-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [server-tests, admin-tests, client-tests]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: vdeio_dev_2024
          MYSQL_DATABASE: vdeio
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pvdeio_dev_2024"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=5

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: admin
          MINIO_ROOT_PASSWORD: vdeio_minio_2024
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd="mc ready local || true"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
        volumes:
          - /tmp/minio-data:/data

      emqx:
        image: emqx/emqx:5.8
        ports:
          - 1883:1883
          - 8083:8083
          - 18083:18083
        options: >-
          --health-cmd="emqx ping"
          --health-interval=15s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Create MinIO buckets
        run: |
          docker run --rm --network host \
            -e MC_HOST_local=http://admin:vdeio_minio_2024@localhost:9000 \
            minio/mc:latest \
            mb local/video-original local/video-encrypted || true

      - name: Seed MySQL schema
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -P 3306 -u root -pvdeio_dev_2024 vdeio < ./server/migrations/001_create_tables.sql

      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      - name: Seed dev data
        working-directory: ./server
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: vdeio
          DB_USER: root
          DB_PASSWORD: vdeio_dev_2024
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-at-least-32-characters-long
          MASTER_KEY: 0123456789abcdef0123456789abcdef
          ADMIN_DEFAULT_USERNAME: admin
          ADMIN_DEFAULT_PASSWORD: admin123
        run: npx ts-node src/seeders/run.ts

      - name: Start server
        working-directory: ./server
        env:
          NODE_ENV: development
          SERVER_PORT: 3000
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: vdeio
          DB_USER: root
          DB_PASSWORD: vdeio_dev_2024
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          MINIO_ENDPOINT: 127.0.0.1
          MINIO_PORT: 9000
          MINIO_ROOT_USER: admin
          MINIO_ROOT_PASSWORD: vdeio_minio_2024
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-at-least-32-characters-long
          MASTER_KEY: 0123456789abcdef0123456789abcdef
          MQTT_BROKER_URL: mqtt://127.0.0.1:1883
          MQTT_USERNAME: vdeio-server
          MQTT_PASSWORD: any
          ADMIN_DEFAULT_USERNAME: admin
          ADMIN_DEFAULT_PASSWORD: admin123
          CORS_ORIGIN: '*'
        run: |
          nohup npx ts-node-dev --files src/app.ts > server.log 2>&1 &
          for i in {1..30}; do
            curl -sf http://localhost:3000/health && break
            sleep 2
          done
          curl -sf http://localhost:3000/health || (cat server.log && exit 1)

      - name: Run E2E flows
        shell: pwsh
        run: |
          $flows = @(
            ".\e2e\dingtalk-login-flow.ps1",
            ".\e2e\store-crud-flow.ps1",
            ".\e2e\video-upload-flow.ps1",
            ".\e2e\campaign-lifecycle-flow.ps1",
            ".\e2e\device-sync-flow.ps1",
            ".\e2e\dashboard-alert-flow.ps1",
            ".\e2e\real-video-upload.ps1",
            ".\e2e\admin-lockout-flow.ps1"
          )
          foreach ($f in $flows) {
            Write-Host "Running $f"
            pwsh -ExecutionPolicy Bypass -File $f
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: ./server/server.log
